# M3Dp Configuration File
# Add to printer.cfg:
# [include m3dp.cfg]
# 
# Changes are based on the work of others, including:
# - jammincollins K2 Improvements: https://github.com/jamincollins/k2-improvements
#
# Features:
# - Optimized START_PRINT_M3DP macro (concurrent heating, reduced redundancies)
# - HEAT_BUMP logic for fast chamber heating with high-temp materials
# - Manual leveling macros optimized to prevent nozzle oozing

[gcode_macro _START_PRINT_VARS]
# Heat Soak Variable
variable_heat_soak: 5 # minutes

# varibles used for leveling macros
variable_leveling_z_offset: 0.1    # approximate thickness of leveling tool

variable_bed_temperature: 60    # bed temperature in degrees celsius

variable_extruder_temperature: 220    # extruder temperature in degrees celsius
variable_wait_temperature: 140        # extruder wait temperature to prevent oozing during leveling

variable_left_front_x: 50    # left front position
variable_left_front_y: 50

variable_left_rear_x: 50     # left rear position
variable_left_rear_y: 300

variable_right_front_x: 300  # right front position
variable_right_front_y: 50

variable_right_rear_x: 300   # right rear position
variable_right_rear_y: 300
gcode:

# if you find you need to alter this macro, please file a feature request
# at https://github.com/jamincollins/k2-improvements

[gcode_macro START_PRINT_M3DP]
# be sure to update your slicer to pass in both chamber temp and if you would like an adaptive mesh
# ADAPTIVE=1 - Do an adaptive mesh calibration
# ADAPTIVE=0 - Do a normal mesh calibration
# START_PRINT_M3DP EXTRUDER_TEMP=[nozzle_temperature_initial_layer] BED_TEMP=[bed_temperature_initial_layer_single] CHAMBER_TEMP=[overall_chamber_temperature] ADAPTIVE=1 HEAT_BUMP=0
variable_prepare: 0
gcode:
    M117 START_PRINT
    BOX_START_PRINT  # initialize print state
    G90
    
    # 1. Gather Variables
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set CHAMBER_TEMP = params.CHAMBER_TEMP|default(0)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(220)|float %}
    {% set EXTRUDER_WAITTEMP = 140.0 %}
    {% set ADAPTIVE = params.ADAPTIVE|default(0)|int %}
    {% set FILAMENT_TYPE = params.FILAMENT_TYPE|default("")|string %}
    
    {% set HEAT_BUMP = 0 %}
    {% if FILAMENT_TYPE == "ABS" or FILAMENT_TYPE == "ASA" %}
        {% set HEAT_BUMP = 1 %}
    {% endif %}
    # Fallback if HEAT_BUMP is passed directly
    {% if params.HEAT_BUMP is defined %}
        {% set HEAT_BUMP = params.HEAT_BUMP|default(0)|int %}
    {% endif %}
    
    {action_respond_info("BED_TEMP = %s \n" % (BED_TEMP))}
    {action_respond_info("CHAMBER_TEMP = %s \n" % (CHAMBER_TEMP))}
    {action_respond_info("EXTRUDER_TEMP = %s \n" % (EXTRUDER_TEMP))}
    {action_respond_info("EXTRUDER_WAITTEMP = %s \n" % (EXTRUDER_WAITTEMP))}
    {action_respond_info("ADAPTIVE = %s \n" % (ADAPTIVE))}
    {action_respond_info("FILAMENT_TYPE = %s \n" % (FILAMENT_TYPE))}
    {action_respond_info("HEAT_BUMP = %s \n" % (HEAT_BUMP))}
    
    # 2. Start Heating Concurrently (Non-Blocking)
    M106 S0  # Turn off part cooling fan
    M140 S{BED_TEMP} # Start bed heating immediately
    {% if CHAMBER_TEMP > 0 %}
        M141 S{CHAMBER_TEMP} # Start chamber heating
    {% endif %}
    M104 S{EXTRUDER_WAITTEMP} # Heat extruder to wait temp to soften filament

    # 3. Initial Homing
    # Home immediately after BOX_START_PRINT to prevent sensorless homing timeouts
    G28
    
    # 4. Wait for Extruder Wait Temp (so nozzle wipe and probing is clean)
    M109 S{EXTRUDER_WAITTEMP}
    BOX_NOZZLE_CLEAN
    
    # 5. Mechanical Preparation (Z-Tilt)
    # ensure bed is level
    Z_TILT_ADJUST
    # rehome Z after tilt adjust
    G28 Z

    # 5. Wait for Chamber and Bed to reach target
    {% if CHAMBER_TEMP > 0 %}
        M117 Heating chamber ...
        M191 S{CHAMBER_TEMP}
        
        {% set SOAK_TIME = printer['gcode_macro _START_PRINT_VARS'].heat_soak|float %}
        {% if SOAK_TIME > 0 %}
            M117 Heat soaking ...
            {action_respond_info("Heat soaking for %s minutes \n" % (SOAK_TIME))}
            G4 P{60000 * SOAK_TIME}
        {% endif %}
    {% endif %}

    M117 Heating bed ...
    M190 S{BED_TEMP} # Ensure bed is at target temp

    # 6. Final Accurate Z-Homing (Creality specific accuracy macro)
    {% if printer['gcode_macro START_PRINT_M3DP'].prepare|int == 0 %}
        {action_respond_info("print prepared 111")}
        NEXT_HOMEZ_NACCU
        G28 Z
    {% else %}
        PRINT_PREPARE_CLEAR
    {% endif %}
    
    # 7. Bed Mesh
    {% if ADAPTIVE > 0 %}
        {% set print_min = (params.PRINT_MIN|default("0,0")).split(",") %}
        {% set print_max = (params.PRINT_MAX|default("0,0")).split(",") %}
        {% if print_min[0]|float > 0 and print_max[0]|float > 0 %}
            # Calculate mesh bounds with a 5mm margin
            {% set mesh_min_x = [print_min[0]|float - 5.0, 5.0]|max %}
            {% set mesh_min_y = [print_min[1]|float - 5.0, 5.0]|max %}
            {% set mesh_max_x = [print_max[0]|float + 5.0, 345.0]|min %}
            {% set mesh_max_y = [print_max[1]|float + 5.0, 345.0]|min %}
            
            {% set get_count = params.PROBE_COUNT|default("") %}

            {% if get_count %}
                # PRTouch spiral probing hardcodes probe_count. Dynamically passing PROBE_COUNT will crash.
                # We ignore get_count here and rely on printer.cfg probe_count.
            {% endif %}

            # K2 PRTouch wrapper strictly requires probe counts to match the config (due to spiral arrays).
            # We only pass the area boundaries, and let it use the fixed 5x5 config from printer.cfg.
            BED_MESH_CALIBRATE PROFILE=adaptive MESH_MIN={mesh_min_x},{mesh_min_y} MESH_MAX={mesh_max_x},{mesh_max_y}
        {% else %}
            BED_MESH_CALIBRATE PROFILE=adaptive ADAPTIVE=1
        {% endif %}
        BED_MESH_PROFILE LOAD=adaptive
    {% else %}
        MESH_IF_NEEDED BED_TEMP={BED_TEMP} CHAMBER_TEMP={CHAMBER_TEMP}
        BED_MESH_PROFILE LOAD={BED_TEMP}c_{CHAMBER_TEMP}c
        M117 MESH: {BED_TEMP}c_{CHAMBER_TEMP}c
    {% endif %}

    # 8. Final Extruder Heating
    BOX_GO_TO_EXTRUDE_POS
    M109 S{EXTRUDER_TEMP} ;wait for nozzle heating

    # 9. Set Chamber Heat Bump
    {% if HEAT_BUMP == 1 %}
        {% if CHAMBER_TEMP > 0 %}
            {% if CHAMBER_TEMP + 5 <= 60 %}
                M141 S{CHAMBER_TEMP + 5}
            {% else %}
                M141 S60
            {% endif %}
        {% endif %}
    {% endif %}

    # 10. Print Settings Reset
    M220 S100 ;Reset Feedrate
    G21
    SET_VELOCITY_LIMIT SQUARE_CORNER_VELOCITY=10 ACCEL=5000 ACCEL_TO_DECEL=5000
    M204 S5000

    G92 E0 ; Reset Extruder
    SET_PIN PIN=extruder_fan VALUE=1
    M117 Printing ...

[respond]

[gcode_macro A_1_LEFT_FRONT]
description: leveling front left
gcode:
    {% set z_offset = printer["gcode_macro _START_PRINT_VARS"].leveling_z_offset %}
    {% set pos_x = printer["gcode_macro _START_PRINT_VARS"].left_front_x %}
    {% set pos_y = printer["gcode_macro _START_PRINT_VARS"].left_front_y %}
    {% set ext_temp = printer["gcode_macro _START_PRINT_VARS"].wait_temperature %}
    {% set bed_temp = printer["gcode_macro _START_PRINT_VARS"].bed_temperature %}
    {action_respond_info("Moving to front left screw")}
    M140 S{bed_temp}
    M104 S{ext_temp}
    {% if 'xy' not in printer.toolhead.homed_axes %}
    {action_respond_info("Wait for extruder temp")}
    M109 S{ext_temp}
    G28
    {% endif %}
    {action_respond_info("Wait for bed temp")}
    M190 S{bed_temp}
    BED_MESH_CLEAR
    G90
    G21
    G1 Z5 F300
    G1 X{pos_x} Y{pos_y} F5000
    G1 Z{z_offset} F300

